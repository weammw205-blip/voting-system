name: voting system CI

on:
  push:
    branches:
      - main
      - feature-update-clean

  pull_request:
    branches:
      - main

jobs:
  build-and-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Initialize project
        run: npm init -y

      - name: Install ESLint
        run: npm install eslint

      - name: Check project files
        run: |
          echo "Checking required files..."
          test -f view-polls.html
          test -f view-polls.js
          test -f view-polls.css

      - name: Run ESLint
        run: |
          npx eslint view-polls.js || true

      - name: Success message
        run: echo "CI passed successfully"